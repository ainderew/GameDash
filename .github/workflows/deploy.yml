name: Build & Deploy GameDash

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ainderew/gamedash

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Static SPA image (Dockerfile: pnpm build → nginx). No runtime env needed.
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Same droplet + secrets as the Workdash deploy (DROPLET_IP, SSH_PRIVATE_KEY,
      # GHCR_PAT must be set on this repo). Container publishes on loopback :3002,
      # which the host nginx gamedash vhost proxies (deploy/gamedash.nginx.conf).
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ainderew
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT,GHCR_USER
          script: |
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker stop gamedash-web || true
            docker rm gamedash-web || true
            docker run -d \
              --name gamedash-web \
              -p 127.0.0.1:3002:80 \
              --restart unless-stopped \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker image prune -f
