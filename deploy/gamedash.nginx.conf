# GameDash vhost for the shared VPS (host nginx, alongside tracker + workdash).
# Proxies gamedash.workdash.site → the loopback port the container publishes
# (docker-compose.vps.yml → 127.0.0.1:3002).
#
# Install:
#   1. DNS: A record  gamedash.workdash.site → 194.233.79.158  (already set)
#   2. cp deploy/gamedash.nginx.conf /etc/nginx/sites-available/gamedash
#      ln -s /etc/nginx/sites-available/gamedash /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d gamedash.workdash.site
#      (certbot rewrites this block: adds `listen 443 ssl` + cert paths and a
#       port-80 → 443 redirect, exactly like the tracker/workdash vhosts.)
server {
    server_name gamedash.workdash.site;

    # Three.js bundle + GLB models are chunky.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
}
