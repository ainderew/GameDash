# In-container nginx: serves the built SPA with history-API fallback and
# gzips the (large) Three.js bundle. The host nginx is the TLS edge and
# proxies to this over the loopback port.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Content-hashed assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: every other path resolves to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
